name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dev environment
        run: uv sync --group dev --frozen

      - name: Prepare benchmark datasets
        run: uv run dataset_assets_cli prepare-used

      - name: Compile sources
        run: uv run python -m compileall src tests

      - name: Run test suite
        run: uv run pytest

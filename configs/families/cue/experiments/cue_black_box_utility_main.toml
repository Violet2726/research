# CUE 黑盒效用控制主实验入口。
name = "cue_black_box_utility_main"
description = "CUE 黑盒效用控制主实验，评估基于效用估计的通信调度是否优于固定触发策略。"
experiment_note = """
实验定位：CUE 路线的主入口，覆盖多类同上下文 benchmark。
核心问题：在无法直接观测真实收益的前提下，黑盒效用估计是否足以驱动更优的通信决策。
结果用途：为效用控制型通信策略提供诊断性和机制性证据。
"""
benchmark_configs = [
  "configs/core/shared/benchmarks/gsm8k/test.toml",
  "configs/core/shared/benchmarks/math500/test.toml",
  "configs/core/shared/benchmarks/strategyqa/dev.toml",
  "configs/core/shared/benchmarks/hotpotqa/validation_distractor.toml",
  "configs/core/shared/benchmarks/mmlu-pro/test.toml",
]
protocol = "configs/families/cue/protocols/shared_3a_r1.toml"
policy_configs = [
  "configs/families/cue/policies/always_communicate.toml",
  "configs/families/cue/policies/disagreement_triggered.toml",
  "configs/families/cue/policies/consensus_freeze.toml",
  "configs/families/cue/policies/cue_v1.toml",
]
control_catalog = "configs/families/cue/controls/core_only.toml"
global_seed = 42
prompt_version = "cue_v1_json"
max_concurrent_requests = 90
requests_per_minute_limit = 95
tokens_per_minute_limit = 9000000
primary_model_ref = "xiaomimimo/mimo-v2.5"

[phases.count20]
split_suffix = "count20_seed42"

[phases.count100]
split_suffix = "count100_seed42"

[phases.count300]
split_overrides = { gsm8k = "count300_seed42", math500 = "count300_seed42", strategyqa = "full229_seed42", hotpotqa = "count300_seed42", mmlu_pro = "count300_seed42" }

[phases.count500]
split_overrides = { gsm8k = "count500_seed42", math500 = "full500_seed42", strategyqa = "full229_seed42", hotpotqa = "count500_seed42", mmlu_pro = "count500_seed42" }

# Free-MAD-lite 机制验证实验入口。
name = "free_mad_lite_mechanism_validation"
description = "Free-MAD-lite 机制验证实验，聚焦单轮反从众与轨迹裁判的增益来源。"
experiment_note = """
实验定位：Free-MAD-lite 的机制验证入口，重点关注轻量化自由辩论方案是否值得保留。
核心问题：反从众终局与轨迹裁判相较于初始投票、标准 MAD 终局能否带来一致收益。
结果用途：为是否继续扩展 Free-MAD-lite 提供机制层面的证据，而不是直接承担主表职责。
"""
benchmark_configs = [
  "configs/core/shared/benchmarks/gsm8k/test.toml",
  "configs/core/shared/benchmarks/strategyqa/dev.toml",
  "configs/core/shared/benchmarks/hotpotqa/validation_distractor.toml",
]
protocol = "configs/families/free_mad_lite/protocols/shared_3a_r1.toml"
methods = [
  "mv_3_initial",
  "vanilla_mad_r1_final_vote",
  "anti_conformity_final_vote",
  "free_mad_lite_llm_trajectory",
]
global_seed = 42
prompt_version = "free_mad_lite_v1_json"
max_concurrent_requests = 90
requests_per_minute_limit = 95
tokens_per_minute_limit = 9000000
primary_model_ref = "deepseek/deepseek-v4-flash"

[phases.count20]
split_suffix = "count20_seed42"

[phases.count100]
split_suffix = "count100_seed42"

[phases.count300]
split_overrides = { gsm8k = "count300_seed42", strategyqa = "full229_seed42", hotpotqa = "count300_seed42" }

[phases.count500]
split_overrides = { gsm8k = "count500_seed42", strategyqa = "full229_seed42", hotpotqa = "count500_seed42" }

# DALA-lite 同上下文主实验入口。
name = "dala_lite_same_context_main"
description = "DALA-lite 同上下文主实验，评估预算受限通信在核心基准上的收益。"
experiment_note = """
实验定位：预算通信主入口，覆盖 GSM8K、StrategyQA、HotpotQA 的同上下文设置。
核心问题：在有限通信预算下，基于 value density 的消息竞拍能否逼近全通信效果并显著优于无通信。
结果用途：作为预算通信路线的 headline 结果来源。
"""
benchmark_configs = [
  "configs/core/shared/benchmarks/gsm8k/test.toml",
  "configs/core/shared/benchmarks/strategyqa/dev.toml",
  "configs/core/shared/benchmarks/hotpotqa/validation_distractor.toml",
]
protocol = "configs/families/budget_comm/protocols/shared_3a_r1.toml"
auction_policy = "configs/families/budget_comm/policies/dala_lite_v1.toml"
context_view = "configs/families/budget_comm/views/same_context_v1.toml"
global_seed = 42
prompt_version = "budget_comm_dala_lite_v1"
calibration_sample_size = 5
max_concurrent_requests = 40
requests_per_minute_limit = 50
tokens_per_minute_limit = 1000000
primary_model_ref = "deepseek/deepseek-v4-flash"

[phases.count20]
split_suffix = "count20_seed42"

[phases.count100]
split_suffix = "count100_seed42"

[phases.count300]
split_overrides = { gsm8k = "count300_seed42", strategyqa = "full229_seed42", hotpotqa = "count300_seed42" }

[phases.count500]
split_overrides = { gsm8k = "count500_seed42", strategyqa = "full229_seed42", hotpotqa = "count500_seed42" }

# DALA-lite 分上下文主实验入口。
name = "dala_lite_split_context_main"
description = "DALA-lite 分上下文主实验，评估预算受限通信在信息拆分场景中的有效性。"
experiment_note = """
实验定位：预算通信在 split-context 条件下的主入口，覆盖 StrategyQA 与 HotpotQA。
核心问题：当智能体持有互补信息时，预算约束下的竞拍式通信能否高效传递关键证据。
结果用途：补齐预算通信在信息不完备条件下的 headline 证据。
"""
benchmark_configs = [
  "configs/core/shared/benchmarks/strategyqa/dev.toml",
  "configs/core/shared/benchmarks/hotpotqa/validation_distractor.toml",
]
protocol = "configs/families/budget_comm/protocols/shared_3a_r1.toml"
auction_policy = "configs/families/budget_comm/policies/dala_lite_v1.toml"
context_view = "configs/families/budget_comm/views/split_context_v1.toml"
global_seed = 42
prompt_version = "budget_comm_dala_lite_v1"
calibration_sample_size = 5
max_concurrent_requests = 40
requests_per_minute_limit = 50
tokens_per_minute_limit = 1000000
primary_model_ref = "deepseek/deepseek-v4-flash"

[phases.count20]
split_suffix = "count20_seed42"

[phases.count100]
split_suffix = "count100_seed42"

[phases.count300]
split_overrides = { strategyqa = "full229_seed42", hotpotqa = "count300_seed42" }

[phases.count500]
split_overrides = { strategyqa = "full229_seed42", hotpotqa = "count500_seed42" }

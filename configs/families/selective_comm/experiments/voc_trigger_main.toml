# VoC 触发主实验入口。
name = "voc_trigger_main"
description = "VoC 触发主实验，用于评估基于 claim-span 与不确定性代理的选择性通信策略。"
experiment_note = """
实验定位：选择性通信中基于 Value of Communication 代理信号的主入口。
核心问题：claim divergence 与 uncertainty-type diversity 等代理量能否稳定识别值得通信的样本。
结果用途：验证 VoC 风格触发是否能够替代更朴素的分歧或置信度触发规则。
"""
benchmark_configs = [
  "configs/core/shared/benchmarks/gsm8k.toml",
  "configs/core/shared/benchmarks/strategyqa.toml",
  "configs/core/shared/benchmarks/hotpotqa.toml",
]
protocol = "configs/families/selective_comm/protocols/shared_3a_r1.toml"
policy_configs = [
  "configs/families/selective_comm/policies/always_communicate.toml",
  "configs/families/selective_comm/policies/disagreement_triggered.toml",
  "configs/families/selective_comm/policies/confidence_triggered.toml",
  "configs/families/selective_comm/policies/hybrid_trigger.toml",
  "configs/families/selective_comm/policies/voc_trigger_v2.toml",
]
control_catalog = "configs/families/selective_comm/controls/trigger_equal_budget.toml"
global_seed = 42
prompt_version = "selective_comm_voc_json_v2"
max_concurrent_requests = 60
requests_per_minute_limit = 90
tokens_per_minute_limit = 9000000
primary_model_ref = "xiaomimimo/mimo-v2.5"

[phases.smoke20]
split_suffix = "count20_seed42"

[phases.pilot100]
split_suffix = "count100_seed42"

[phases.confirmatory300]
split_overrides = { gsm8k = "count300_seed42", strategyqa = "full229_seed42", hotpotqa = "count300_seed42" }

[phases.confirmatory500]
split_overrides = { gsm8k = "count500_seed42", strategyqa = "full229_seed42", hotpotqa = "count500_seed42" }

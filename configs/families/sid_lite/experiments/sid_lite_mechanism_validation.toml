# SID-lite 机制验证实验入口。
name = "sid_lite_mechanism_validation"
description = "SID-lite 机制验证实验，聚焦置信度早停与消息压缩的组合收益。"
experiment_note = """
实验定位：SID-lite 路线的机制验证入口，比较始终全通信、仅压缩、SID-lite 三种策略。
核心问题：置信度早停与压缩消息分别贡献了多少收益，它们的组合是否优于单独使用。
结果用途：为后续是否保留 SID-lite 路线提供机制证据。
"""
benchmark_configs = [
  "configs/core/shared/benchmarks/gsm8k.toml",
  "configs/core/shared/benchmarks/strategyqa.toml",
  "configs/core/shared/benchmarks/hotpotqa.toml",
]
protocol = "configs/families/sid_lite/protocols/shared_3a_r1.toml"
methods = ["mv_3", "always_full", "compression_only", "sid_lite"]
global_seed = 42
prompt_version = "sid_lite_v1_json"
max_concurrent_requests = 5
requests_per_minute_limit = 50
tokens_per_minute_limit = 1000000
primary_model_ref = "deepseek/deepseek-v4-flash"

[phases.smoke20]
split_suffix = "count20_seed42"

[phases.pilot100]
split_suffix = "count100_seed42"

[phases.confirmatory300]
split_overrides = { gsm8k = "count300_seed42", strategyqa = "full229_seed42", hotpotqa = "count300_seed42" }

[phases.confirmatory500]
split_overrides = { gsm8k = "count500_seed42", strategyqa = "full229_seed42", hotpotqa = "count500_seed42" }

name = "dmad_reasoning_extended"
description = "DMAD 扩展验证实验，不参与论文主结果结论。"
evaluation_scope = "extended_validation"
paper_alignment_version = "dmad_iclr2025_llm_text_v1"
benchmark_configs = [
  "configs/core/shared/benchmarks/strategyqa/dev.toml",
  "configs/core/shared/benchmarks/hotpotqa/validation_distractor.toml",
]
protocol = "configs/families/dmad/protocols/dmad_3a_r2.toml"
global_seed = 42
prompt_version = "dmad_v1_json"
max_concurrent_requests = 90
requests_per_minute_limit = 95
tokens_per_minute_limit = 9000000
primary_model_ref = "xiaomimimo/mimo-v2.5"

[[methods]]
name = "cot"
mode = "single_cot"

[[methods]]
name = "sbp"
mode = "single_sbp"

[[methods]]
name = "l2m"
mode = "single_l2m"

[[methods]]
name = "cot_sc"
mode = "single_cot_sc"

[[methods]]
name = "sbp_sc"
mode = "single_sbp_sc"

[[methods]]
name = "l2m_sc"
mode = "single_l2m_sc"

[[methods]]
name = "self_refine"
mode = "self_refine_cot"

[[methods]]
name = "self_contrast"
mode = "self_contrast_cot_sbp_l2m"

[[methods]]
name = "mrp"
mode = "mrp_cot_sbp_l2m"

[[methods]]
name = "mad_persona_d"
mode = "mad_persona_d"
roster = "configs/families/dmad/rosters/mad_persona_discriminative_3agent.toml"

[[methods]]
name = "mad_persona_e"
mode = "mad_persona_e"
roster = "configs/families/dmad/rosters/mad_persona_extractive_3agent.toml"

[[methods]]
name = "mad_all_cot"
mode = "mad_all_cot"
roster = "configs/families/dmad/rosters/mad_all_cot_3agent.toml"

[[methods]]
name = "mad_all_sbp"
mode = "mad_all_sbp"
roster = "configs/families/dmad/rosters/mad_all_sbp_3agent.toml"

[[methods]]
name = "mad_all_l2m"
mode = "mad_all_l2m"
roster = "configs/families/dmad/rosters/mad_all_l2m_3agent.toml"

[[methods]]
name = "dmad_cot_sbp_l2m"
mode = "dmad_cot_sbp_l2m"
roster = "configs/families/dmad/rosters/dmad_cot_sbp_l2m_3agent.toml"

[phases.count20]
split_overrides = { strategyqa = "count20_seed42", hotpotqa = "count20_seed42" }

[phases.count100]
split_overrides = { strategyqa = "count100_seed42", hotpotqa = "count100_seed42" }

[phases.count300]
split_overrides = { strategyqa = "full229_seed42", hotpotqa = "count300_seed42" }

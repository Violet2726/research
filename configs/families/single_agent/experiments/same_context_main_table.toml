# 同上下文主表基准上的单智能体对照实验。
name = "same_context_main_table"
description = "同上下文主表基准上的单智能体对照实验，作为主表通信方法的无通信参考。"
experiment_note = """
实验定位：面向论文主表的单智能体对照入口，覆盖 Math500、HotpotQA、MMLU-Pro、GPQA Diamond。
核心问题：在更高难度的同上下文基准上，单智能体 CoT 与 SC_5 能达到怎样的性能上限与成本曲线。
结果用途：为 SPARC 与其他通信方法提供同一批主表 benchmark 的无通信参考点。
"""
method_catalog = "configs/families/single_agent/methods/common.toml"
benchmark_configs = [
  "configs/core/shared/benchmarks/math500/test.toml",
  "configs/core/shared/benchmarks/hotpotqa/validation_distractor.toml",
  "configs/core/shared/benchmarks/mmlu-pro/test.toml",
  "configs/core/shared/benchmarks/gpqa/dataset.toml",
]
global_seed = 42
reruns_per_method = 3
prompt_version = "single_agent_reasoning_json_v1"
max_concurrent_requests = 90
requests_per_minute_limit = 95
tokens_per_minute_limit = 9000000
primary_model_ref = "xiaomimimo/mimo-v2.5"

[phases.count20]
split_overrides = { math500 = "count20_seed42", hotpotqa = "count20_seed42", mmlu_pro = "count20_seed42", gpqa_diamond = "count20_seed42" }
methods = ["cot_1", "sc_5"]
reruns_override = 1

[phases.count100]
split_overrides = { math500 = "count100_seed42", hotpotqa = "count100_seed42", mmlu_pro = "count100_seed42", gpqa_diamond = "count100_seed42" }
methods = ["cot_1", "sc_5"]
reruns_override = 1

[phases.count300]
split_overrides = { math500 = "count300_seed42", hotpotqa = "count300_seed42", mmlu_pro = "count300_seed42", gpqa_diamond = "full198_seed42" }
methods = ["cot_1", "sc_5"]
reruns_override = 1

[phases.count500]
split_overrides = { math500 = "full500_seed42", hotpotqa = "count500_seed42", mmlu_pro = "count500_seed42", gpqa_diamond = "full198_seed42" }
methods = ["cot_1", "sc_5"]
reruns_override = 1

[phases.count500_main]
split_overrides = { math500 = "full500_seed42", hotpotqa = "count500_seed42", mmlu_pro = "count500_seed42", gpqa_diamond = "full198_seed42" }
methods = ["cot_1", "sc_5"]
reruns_override = 3

[phases.full12032]
benchmark_filter = ["mmlu_pro"]
split_overrides = { mmlu_pro = "full12032_seed42" }
methods = ["sc_5"]
reruns_override = 1

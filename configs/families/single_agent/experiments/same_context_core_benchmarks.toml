# 同上下文核心基准上的单智能体无通信基线实验。
name = "same_context_core_benchmarks"
description = "同上下文核心基准上的单智能体无通信基线实验，对比 CoT 与 Self-Consistency。"
experiment_note = """
实验定位：单智能体主基线入口，覆盖 GSM8K、StrategyQA、HotpotQA。
核心问题：在不引入通信机制的前提下，CoT 与 SC_k 的收益、成本与稳定性如何变化。
结果用途：为多智能体、选择性通信、预算通信和 SPARC 相关实验提供统一 lower bound 与无通信对照。
"""
method_catalog = "configs/families/single_agent/methods/common.toml"
benchmark_configs = [
  "configs/core/shared/benchmarks/gsm8k/test.toml",
  "configs/core/shared/benchmarks/strategyqa/dev.toml",
  "configs/core/shared/benchmarks/hotpotqa/validation_distractor.toml",
]
global_seed = 42
reruns_per_method = 3
prompt_version = "single_agent_reasoning_json_v1"
max_concurrent_requests = 90
requests_per_minute_limit = 95
tokens_per_minute_limit = 9000000
primary_model_ref = "xiaomimimo/mimo-v2.5"

[phases.count20]
split_suffix = "count20_seed42"
methods = ["cot_1", "sc_5"]
reruns_override = 1

[phases.count100]
split_suffix = "count100_seed42"
methods = ["cot_1", "sc_5"]
reruns_override = 1

[phases.count300]
methods = ["cot_1", "sc_5"]
split_overrides = { gsm8k = "count300_seed42", strategyqa = "full229_seed42", hotpotqa = "count300_seed42" }
reruns_override = 1

[phases.count500]
methods = ["cot_1", "sc_5"]
split_overrides = { gsm8k = "count500_seed42", strategyqa = "full229_seed42", hotpotqa = "count500_seed42" }
reruns_override = 1

[phases.count300_main]
methods = ["cot_1", "sc_3", "sc_5", "sc_7"]
split_overrides = { gsm8k = "count300_seed42", strategyqa = "full229_seed42", hotpotqa = "count300_seed42" }
reruns_override = 3

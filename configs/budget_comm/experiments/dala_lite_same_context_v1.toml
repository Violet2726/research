name = "dala_lite_same_context_v1"
description = "DALA-lite v1 smoke20 on same-context GSM8K, StrategyQA, and HotpotQA."
benchmark_configs = [
  "configs/shared/benchmarks/gsm8k.toml",
  "configs/shared/benchmarks/strategyqa.toml",
  "configs/shared/benchmarks/hotpotqa.toml",
]
protocol = "configs/budget_comm/protocols/shared_3a_r1.toml"
auction_policy = "configs/budget_comm/policies/dala_lite_v1.toml"
context_view = "configs/budget_comm/views/same_context_v1.toml"
global_seed = 42
prompt_version = "budget_comm_dala_lite_v1"
calibration_sample_size = 5
max_concurrent_requests = 40
requests_per_minute_limit = 50
tokens_per_minute_limit = 1000000
primary_model_ref = "deepseek/deepseek-v4-flash"

[phases.smoke20]
split_suffix = "smoke20_seed42"

[phases.pilot100]
split_suffix = "pilot100_seed42"


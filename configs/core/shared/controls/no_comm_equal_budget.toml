# 等预算无通信对照目录。
# 这些控制方法用于和需要固定调用预算的方法做公平对照。
# 例如：
# - mad_2a_r1 -> cot_1 / mv_4
# - mad_3a_r1 -> mv_6

[methods.cot_1]
family = "cot"
budget_calls = 1
temperature = 0.0
top_p = 1.0
max_output_tokens = 256

[methods.mv_4]
family = "majority_vote"
budget_calls = 4
temperature = 0.7
top_p = 1.0
max_output_tokens = 256

[methods.mv_6]
family = "majority_vote"
budget_calls = 6
temperature = 0.7
top_p = 1.0
max_output_tokens = 256

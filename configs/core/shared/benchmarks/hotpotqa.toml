# HotpotQA benchmark 配置。
name = "HotpotQA"
slug = "hotpotqa"
loader = "hotpotqa_parquet"
source_path = "hotpotqa/validation_distractor.parquet"
source_split = "validation_distractor"
sample_id_prefix = "hotpotqa"
question_field = "question"
answer_field = "answer"
smoke_size = 20
pilot_size = 100
main_size = 300
random_seed = 42
# 当前 v1 只统计答案 EM，不统计 supporting facts。
notes = "Answer EM only for v1 main table."

[[split_presets]]
name = "count20_seed42"
strategy = "shuffle"
size = 20

[[split_presets]]
name = "count100_seed42"
strategy = "shuffle"
size = 100

[[split_presets]]
name = "count300_seed42"
strategy = "shuffle"
size = 300

[[split_presets]]
name = "count500_seed42"
strategy = "shuffle"
size = 500

[[split_presets]]
name = "full7405_seed42"
strategy = "full"
size = 7405

# Vanilla MAD 的等预算单模型对照目录。
# 这些控制方法专门对应：
# - mad_2a_r1 -> sc_4 / mv_4
# - mad_3a_r1 -> sc_6 / mv_6
# - mad_3a_r2 -> sc_9 / mv_9

[methods.cot_1]
family = "cot"
budget_calls = 1
temperature = 0.0
top_p = 1.0
max_output_tokens = 256

[methods.sc_4]
# Self-Consistency，预算对齐 mad_2a_r1。
family = "self_consistency"
budget_calls = 4
temperature = 0.7
top_p = 1.0
max_output_tokens = 256

[methods.mv_4]

# multi_agent 正式实验入口。
name = "multi_agent_main"
description = "Formal controlled debate-vs-vote experiment across same-context reasoning benchmarks."
benchmark_configs = [
  "configs/shared/benchmarks/gsm8k.toml",
  "configs/shared/benchmarks/strategyqa.toml",
  "configs/shared/benchmarks/hotpotqa.toml",
]
control_catalog = "configs/shared/controls/no_comm_equal_budget.toml"
global_seed = 42
prompt_version = "multi_agent_controlled_json"
max_concurrent_requests = 5
requests_per_minute_limit = 50
tokens_per_minute_limit = 1000000
primary_model_ref = "xiaomimimo/mimo-v2.5"

[[setups]]
name = "mad_2a_r1"
protocol = "configs/multi_agent/protocols/vanilla_mad_r1.toml"
roster = "configs/multi_agent/rosters/homogeneous_2agent.toml"
matched_controls = ["cot_1", "mv_4"]

[[setups]]
name = "mad_3a_r1"
protocol = "configs/multi_agent/protocols/vanilla_mad_r1.toml"
roster = "configs/multi_agent/rosters/homogeneous_3agent.toml"
matched_controls = ["mv_6"]

[phases.smoke20]
split_suffix = "smoke20_seed42"
setups = ["mad_2a_r1", "mad_3a_r1"]

[phases.pilot100]
split_suffix = "pilot100_seed42"
setups = ["mad_2a_r1", "mad_3a_r1"]

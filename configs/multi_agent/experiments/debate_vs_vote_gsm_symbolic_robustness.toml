name = "debate-vs-vote-gsm-symbolic-robustness"
description = "Controlled debate-vs-vote robustness comparison on the frozen GSM-Symbolic 200 split."
benchmark_configs = [
  "configs/shared/benchmarks/gsm_symbolic.toml",
]
control_catalog = "configs/multi_agent/controls/vanilla_equal_budget.toml"
global_seed = 42
prompt_version = "multi_agent_controlled_json"
max_concurrent_requests = 4
requests_per_minute_limit = 180
tokens_per_minute_limit = 400000

[[setups]]
name = "mad_3a_r1"
protocol = "configs/multi_agent/protocols/vanilla_mad_r1.toml"
roster = "configs/multi_agent/rosters/homogeneous_3agent.toml"
matched_controls = []

[phases.smoke20]
split_overrides = { gsm_symbolic = "smoke20_seed42" }
setups = ["mad_3a_r1"]

[phases.main]
split_overrides = { gsm_symbolic = "robustness200_seed42" }
setups = ["mad_3a_r1"]

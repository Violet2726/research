name = "debate_vs_vote_controlled"
description = "Controlled paired comparison between direct vote and debate-then-vote on the same initial candidates."
benchmark_configs = [
  "configs/shared/benchmarks/gsm8k.toml",
  "configs/shared/benchmarks/hotpotqa.toml",
]
control_catalog = "configs/multi_agent/controls/vanilla_equal_budget.toml"
global_seed = 42
prompt_version = "multi_agent_controlled_json"
max_concurrent_requests = 5
requests_per_minute_limit = 50
tokens_per_minute_limit = 1000000
primary_model_ref = "xiaomimimo/mimo-v2.5"
[[setups]]
name = "mad_3a_r1"
protocol = "configs/multi_agent/protocols/vanilla_mad_r1.toml"
roster = "configs/multi_agent/rosters/homogeneous_3agent.toml"
matched_controls = []

[phases.smoke20]
split_overrides = { gsm8k = "smoke20_seed42", hotpotqa = "smoke20_seed42" }
setups = ["mad_3a_r1"]

[phases.pilot100]
split_overrides = { gsm8k = "pilot100_seed42", hotpotqa = "pilot100_seed42" }
setups = ["mad_3a_r1"]

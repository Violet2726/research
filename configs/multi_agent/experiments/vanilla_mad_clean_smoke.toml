name = "vanilla-mad-clean-smoke"
description = "Clean smoke pilot for debate-vs-vote under equal 4-call budget."
benchmark_configs = [
  "configs/shared/benchmarks/gsm8k.toml",
  "configs/shared/benchmarks/strategyqa.toml",
  "configs/shared/benchmarks/hotpotqa.toml",
]
control_catalog = "configs/multi_agent/controls/vanilla_equal_budget.toml"
global_seed = 42
prompt_version = "multi_agent_debate_json"
max_concurrent_requests = 5
requests_per_minute_limit = 50
tokens_per_minute_limit = 1000000
[[setups]]
name = "mad_2a_r1"
protocol = "configs/multi_agent/protocols/vanilla_mad_r1.toml"
roster = "configs/multi_agent/rosters/homogeneous_2agent.toml"
matched_controls = ["cot_1", "sc_4", "mv_4"]

[phases.smoke20]
split_suffix = "smoke20_seed42"
setups = ["mad_2a_r1"]

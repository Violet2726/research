# CUE 黑盒效用控制主实验入口。
name = "cue_black_box_utility_main"
description = "CUE 黑盒效用控制主实验，评估基于效用估计的通信调度是否优于固定触发策略。"
experiment_note = """
实验定位：CUE 路线的主入口，覆盖多类同上下文 benchmark。
核心问题：在无法直接观测真实收益的前提下，黑盒效用估计是否足以驱动更优的通信决策。
结果用途：为效用控制型通信策略提供诊断性和机制性证据。
"""
benchmark_configs = [
  "configs/shared/benchmarks/gsm8k.toml",
  "configs/shared/benchmarks/math500.toml",
  "configs/shared/benchmarks/strategyqa.toml",
  "configs/shared/benchmarks/hotpotqa.toml",
  "configs/shared/benchmarks/mmlu_pro.toml",
]
protocol = "configs/cue/protocols/shared_3a_r1.toml"
policy_configs = [
  "configs/cue/policies/always_communicate.toml",
  "configs/cue/policies/disagreement_triggered.toml",
  "configs/cue/policies/consensus_freeze.toml",
  "configs/cue/policies/cue_v1.toml",
]
control_catalog = "configs/cue/controls/core_only.toml"
global_seed = 42
prompt_version = "cue_v1_json"
max_concurrent_requests = 60
requests_per_minute_limit = 90
tokens_per_minute_limit = 9000000
primary_model_ref = "xiaomimimo/mimo-v2.5"

[phases.smoke20]
split_suffix = "smoke20_seed42"

[phases.pilot100]
split_suffix = "pilot100_seed42"

[phases.confirmatory300]
split_overrides = { gsm8k = "dev300_seed42", math500 = "confirmatory300_seed42", strategyqa = "dev_full_229_seed42", hotpotqa = "dev300_seed42", mmlu_pro = "strat300_seed42" }

[phases.confirmatory500]
split_overrides = { gsm8k = "confirmatory500_seed42", math500 = "confirmatory500_seed42", strategyqa = "dev_full_229_seed42", hotpotqa = "confirmatory500_seed42", mmlu_pro = "strat500_seed42" }

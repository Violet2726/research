name = "trigger-early-exit-main-table"
description = "Trigger and early-exit analysis on the SPARC same-context main-table benchmarks."
benchmark_configs = [
  "configs/shared/benchmarks/math500.toml",
  "configs/shared/benchmarks/hotpotqa.toml",
  "configs/shared/benchmarks/mmlu_pro.toml",
  "configs/shared/benchmarks/gpqa_diamond.toml",
]
protocol = "configs/selective_comm/protocols/shared_3a_r1.toml"
policy_configs = [
  "configs/selective_comm/policies/always_communicate.toml",
  "configs/selective_comm/policies/disagreement_triggered.toml",
  "configs/selective_comm/policies/confidence_triggered.toml",
  "configs/selective_comm/policies/hybrid_trigger.toml",
]
control_catalog = "configs/selective_comm/controls/trigger_equal_budget.toml"
global_seed = 42
prompt_version = "selective_comm_trigger_json"
max_concurrent_requests = 8
requests_per_minute_limit = 600
tokens_per_minute_limit = 1000000
primary_backbone = "dashscope/qwen-turbo-1101"

[phases.smoke20]
split_overrides = { math500 = "smoke20_seed42", hotpotqa = "smoke20_seed42", mmlu_pro = "smoke20_seed42", gpqa_diamond = "smoke20_seed42" }

[phases.pilot100]
split_overrides = { math500 = "pilot100_seed42", hotpotqa = "pilot100_seed42", mmlu_pro = "pilot100_seed42", gpqa_diamond = "pilot100_seed42" }

[phases.main]
split_overrides = { math500 = "full500_seed42", hotpotqa = "dev1000_seed42", mmlu_pro = "strat1200_seed42", gpqa_diamond = "full_seed42" }

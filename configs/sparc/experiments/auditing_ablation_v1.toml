# SPARC 审计策略消融实验入口配置。
name = "auditing_ablation_v1"
description = "SPARC smoke experiment for aggregation and local auditing ablation."
experiment_kind = "auditing_ablation"
benchmark_configs = [
  "configs/shared/benchmarks/gsm8k.toml",
  "configs/shared/benchmarks/strategyqa.toml",
  "configs/shared/benchmarks/hotpotqa.toml",
]
protocol = "configs/sparc/protocols/shared_3a_r1.toml"
global_seed = 42
prompt_version = "sparc_v1_json"
max_concurrent_requests = 5
requests_per_minute_limit = 50
tokens_per_minute_limit = 1000000
primary_model_ref = "deepseek/deepseek-v4-flash"
confirmatory_model_ref = "deepseek/deepseek-v4-flash"

[auditing_ablation]
trigger_policy = "always_communicate"
fixed_message_modes = { gsm8k = "disagreement_step_only", strategyqa = "disagreement_step_only", hotpotqa = "critical_evidence_only" }
aggregation_methods = ["majority_vote", "weighted_vote_fallback", "single_judge", "final_round_vote", "local_auditing"]

[phases.smoke20]
split_suffix = "smoke20_seed42"

[phases.pilot100]
split_suffix = "pilot100_seed42"

[phases.confirmatory300]
split_overrides = { gsm8k = "dev300_seed42", strategyqa = "dev_full_229_seed42", hotpotqa = "dev300_seed42" }

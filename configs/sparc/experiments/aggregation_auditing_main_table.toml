name = "aggregation_auditing_main_table"
description = "SPARC aggregation and local-auditing ablation on the main-table same-context benchmarks."
experiment_kind = "auditing_ablation"
benchmark_configs = [
  "configs/shared/benchmarks/math500.toml",
  "configs/shared/benchmarks/hotpotqa.toml",
  "configs/shared/benchmarks/mmlu_pro.toml",
  "configs/shared/benchmarks/gpqa_diamond.toml",
]
protocol = "configs/sparc/protocols/shared_3a_r1.toml"
global_seed = 42
prompt_version = "sparc_v1_json"
max_concurrent_requests = 5
requests_per_minute_limit = 50
tokens_per_minute_limit = 1000000
primary_backbone = "dashscope/qwen-turbo-1101"
confirmatory_backbone = "zhipu/glm-4.6v-flash"

[auditing_ablation]
trigger_policy = "always_communicate"
fixed_message_modes = { math500 = "disagreement_step_only", hotpotqa = "critical_evidence_only", mmlu_pro = "disagreement_step_only", gpqa_diamond = "disagreement_step_only" }
aggregation_methods = ["majority_vote", "weighted_vote_fallback", "single_judge", "final_round_vote", "local_auditing"]

[phases.smoke20]
split_overrides = { math500 = "smoke20_seed42", hotpotqa = "smoke20_seed42", mmlu_pro = "smoke20_seed42", gpqa_diamond = "smoke20_seed42" }

[phases.pilot100]
split_overrides = { math500 = "pilot100_seed42", hotpotqa = "pilot100_seed42", mmlu_pro = "pilot100_seed42", gpqa_diamond = "pilot100_seed42" }

[phases.main]
split_overrides = { math500 = "full500_seed42", hotpotqa = "dev1000_seed42", mmlu_pro = "strat1200_seed42", gpqa_diamond = "full_seed42" }

[phases.mmlu_confirm_full]
benchmark_filter = ["mmlu_pro"]
split_overrides = { mmlu_pro = "test_full_12032_seed42" }

name = "content_ablation_v1"
description = "SPARC smoke experiment for communication content ablation under always-on communication."
experiment_kind = "content_ablation"
benchmark_configs = [
  "configs/shared/benchmarks/gsm8k.toml",
  "configs/shared/benchmarks/strategyqa.toml",
  "configs/shared/benchmarks/hotpotqa.toml",
]
protocol = "configs/sparc/protocols/shared_3a_r1.toml"
global_seed = 42
prompt_version = "sparc_v1_json"
max_concurrent_requests = 5
requests_per_minute_limit = 50
tokens_per_minute_limit = 1000000
primary_backbone = "dashscope/qwen-turbo-1101"
confirmatory_backbone = "dashscope/qwen-turbo-1101"

[content_ablation]
trigger_policy = "always_communicate"
message_modes = [
  "full_cot",
  "answer_only",
  "answer_confidence",
  "disagreement_step_only",
  "critical_evidence_only",
  "task_adaptive",
]

[phases.smoke20]
split_suffix = "smoke20_seed42"

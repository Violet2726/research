name = "sparc_gsm_symbolic_robustness"
description = "SPARC robustness experiment on the frozen GSM-Symbolic 200 split."
experiment_kind = "sparc_v1"
benchmark_configs = [
  "configs/shared/benchmarks/gsm_symbolic.toml",
]
protocol = "configs/sparc/protocols/shared_3a_r1.toml"
global_seed = 42
prompt_version = "sparc_v1_json"
max_concurrent_requests = 2
requests_per_minute_limit = 600
tokens_per_minute_limit = 1000000
primary_backbone = "dashscope/qwen-turbo-1101"
confirmatory_backbone = "zhipu/glm-4.6v-flash"

[sparc_v1]
default_trigger_policy = "hybrid_trigger"
fallback_trigger_policy = "disagreement_triggered"
trigger_drop_questions = 1.0
fixed_message_modes = { gsm_symbolic = "disagreement_step_only" }

[phases.smoke20]
split_overrides = { gsm_symbolic = "smoke20_seed42" }

[phases.main]
split_overrides = { gsm_symbolic = "robustness200_seed42" }

name = "gsm-symbolic-robustness"
description = "Single-agent robustness checks on the frozen GSM-Symbolic 200 split."
method_catalog = "configs/single_agent/methods/common.toml"
benchmark_configs = [
  "configs/shared/benchmarks/gsm_symbolic.toml",
]
global_seed = 42
reruns_per_method = 3
prompt_version = "single_agent_reasoning_json_v1"
max_concurrent_requests = 6
requests_per_minute_limit = 60
tokens_per_minute_limit = 150000

[phases.smoke20]
split_suffix = "smoke20_seed42"
methods = ["cot_1", "sc_5", "mv_3"]
reruns_override = 1

[phases.main]
split_suffix = "robustness200_seed42"
methods = ["cot_1", "sc_5", "mv_3"]
reruns_override = 3

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "api-baselines"
version = "0.1.0"
description = "Professional API baseline runner for CoT, Self-Consistency, and Majority Vote experiments."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.27.0,<1.0.0",
  "pyarrow>=18.0.0,<22.0.0",
  "python-dotenv>=1.0.0,<2.0.0",
]

[project.scripts]
baseline-cli = "api_baselines.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
